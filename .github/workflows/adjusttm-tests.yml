name: adjustTM tests

on:
  push:
    branches:
      - feature/adjustTM-brightness-control
    paths:
      - "adjustTM/**"
      - "photofinishing/**"
      - "utils/constants.py"
      - ".github/workflows/adjusttm-tests.yml"
  pull_request:
    paths:
      - "adjustTM/**"
      - "photofinishing/**"
      - "utils/constants.py"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install focused dependencies
        run: |
          python -m pip install -q --upgrade pip
          python -m pip install -q --index-url https://download.pytorch.org/whl/cpu torch
          python -m pip install -q numpy opencv-python-headless pytest tqdm
      - name: Compile adjustTM
        run: python -m compileall -q adjustTM
      - name: Run adjustTM tests
        shell: bash
        run: |
          set +e
          pytest adjustTM/tests -q > /tmp/adjusttm-pytest.log 2>&1
          status=$?
          tail -n 140 /tmp/adjusttm-pytest.log
          exit $status
