name: adjustTM closed-loop tests

on:
  push:
    branches:
      - feature/adjusttm-closed-loop-qwen-tmqa
    paths:
      - "adjustTM_closed_loop/**"
      - ".github/workflows/adjusttm-closed-loop-tests.yml"
  pull_request:
    paths:
      - "adjustTM_closed_loop/**"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install focused dependencies
        run: |
          python -m pip install -q --upgrade pip
          python -m pip install -q -r adjustTM_closed_loop/requirements.txt
      - name: Compile
        run: PYTHONPATH=. python -m compileall -q adjustTM_closed_loop
      - name: Test
        run: PYTHONPATH=. pytest adjustTM_closed_loop/tests -q
