dataset:
  baseline_level: a_000
  source_dir: null
  strict_complete: true
  recursive: true
objective:
  clip_threshold: 0.99
  shadow_threshold: 0.01
  local_window: 15
  banding_bins: 256
alignment:
  enabled: true
  max_shift_pixels: 12.0
  apply_translation: true
segmentation:
  enabled: false
  provider: disabled
  model: nvidia/segformer-b5-finetuned-ade-640-640
  device: auto
  min_confidence: 0.5
  min_area_fraction: 0.01
vlm:
  primary:
    enabled: false
    base_url: http://127.0.0.1:8000/v1
    api_key: EMPTY
    model: Qwen/Qwen3-VL-8B-Instruct
    timeout_seconds: 120
    temperature: 0.0
    max_tokens: 1200
  arbiter:
    enabled: false
    base_url: http://127.0.0.1:8001/v1
    api_key: EMPTY
    model: OpenGVLab/InternVL3_5-38B
    timeout_seconds: 180
    temperature: 0.0
    max_tokens: 1200
decision:
  keep_score_min: 0.80
  regenerate_score_min: 0.60
  review_uncertainty_min: 0.35
  hard:
    max_luminance_clip_ratio: 0.20
    max_channel_clip_ratio: 0.30
    max_shadow_ratio: 0.45
    min_edge_correlation: 0.80
    min_ssim_normalized: 0.75
    max_color_drift: 0.08
    max_alignment_shift: 12.0
    max_monotonic_violation_rate: 0.0
    min_endpoint_range_ev: 0.40
    max_dead_zone_ratio: 0.35
    min_saturation_score: 0.35
  weights:
    tone: 0.25
    color: 0.15
    fidelity: 0.25
    control: 0.25
    preference: 0.10
reporting:
  save_aligned_images: false
  save_overlays: false
  save_plots: true
